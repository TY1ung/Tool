proxy-groups:
  - {name: Proxy, type: select, include-all: true, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png }
  - {name: AiChat, type: select, proxies: ['🇨🇳 Taiwan', '🇯🇵 Japan'], icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png }
  - {name: Crypto, type: select, proxies: ['🇨🇳 Taiwan', '🇯🇵 Japan'], icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cryptocurrency_1.png }
  - {name: RF4, type: select, proxies: ['🏠 Home Broadband','🇨🇳 Taiwan',  DIRECT], icon: https://raw.githubusercontent.com/TY1ung/QuantumultX/refs/heads/master/IconSet/FishBone.png }
  - {name: Emby, type: select, proxies: [DIRECT, 香港节点, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png }
  - {name: Google, type: select, proxies: [ '🇺🇸 United States'], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Google.png }
  - {name: Apple, type: select, proxies: [DIRECT,  '🇺🇸 United States'], icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_2.png }
  
  - {name:  '🏠 Home Broadband', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "IEPL|家宽|Direct", icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/IEPL.png }
  - {name:  '🇭🇰 Hong Kong', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "港|HK|(?i)Hong", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png }             
  - {name:  '🇯🇵 Japan', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "日|东京|JP|(?i)Japan", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png }
  - {name:  '🇨🇳 Taiwan', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "台|湾|TW|(?i)Taiwan", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png }
  - {name:  '🇺🇸 United States', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "美|US|(?i)States|American", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png }
  - {name:  '🇸🇬 Singapore', type: select, include-all: true, interval: 600, tolerance: 50,  filter: "新|坡|SG|(?i)Singapore", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png }

  - {name: AdRules, type: select, proxies: [REJECT], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Adblock.png }
  - {name: Final, type: select, proxies: [Proxy], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png }

rules:
    - 'RULE-SET,adrules_domainset,AdRules'
    - 'RULE-SET,AiChat_No_Resolve,AiChat'
    - 'RULE-SET,Cryptocurrency_No_Resolve,Crypto'
    - 'RULE-SET,Apple_Classical_No_Resolve,Apple'
    - 'RULE-SET,Google_No_Resolve,Google'
    - 'RULE-SET,RF4_No_Resolve,RF4'
    - 'RULE-SET,Emby_No_Resolve,Emby'
    - 'RULE-SET,YouTube_No_Resolve,Google'
    - 'RULE-SET,BiliBili_No_Resolve,DIRECT'
    - 'RULE-SET,Microsoft_No_Resolve,DIRECT'
    - 'RULE-SET,Download_No_Resolve,DIRECT'
    - 'RULE-SET,Lan_No_Resolve,DIRECT'
    - 'GEOIP,CN,DIRECT'
    - 'MATCH,Final'

